services:
  - type: web
    name: construgest-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements-prod.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: construgest-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://construgest.vercel.app
      - key: DEBUG
        value: "false"

databases:
  - name: construgest-db
    plan: free
    databaseName: construgest
    user: construgest
